# ------------------------------------------------------------------------------
# SOCKET BUFFER & MEMORY ALIGNMENT
# ------------------------------------------------------------------------------
# kern.ipc.maxsockbuf: 16777216 Bytes (16MB) ceiling for socket memory.
# net.inet.tcp.mclbytes: 4096 (4KB) aligns clusters with CPU page size.
kern.ipc.maxsockbuf=16777216
net.inet.tcp.mclbytes=4096

# ------------------------------------------------------------------------------
# TCP PERFORMANCE & CONGESTION
# ------------------------------------------------------------------------------
# net.inet.tcp.delayed_ack: Set to 0 (Disabled) for instant SMB feedback.
# net.inet.tcp.rfc1323: Enables high-performance RFC extensions/timestamps.
# net.inet.tcp.cubic_minor_fixes: Improves CUBIC algorithm on high-speed links.
net.inet.tcp.delayed_ack=0
net.inet.tcp.rfc1323=1
net.inet.tcp.cubic_minor_fixes=1
