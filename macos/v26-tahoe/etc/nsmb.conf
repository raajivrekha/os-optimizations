# ==============================================================================
# FILE NAME: nsmb.conf
# Version: v1.0
# STAMP: 20260509-184500
# FILE OWNERSHIP: root
# FILE GROUP: wheel
# FILE PERMISSIONS: 644 (rw-r--r--)
# DESCRIPTION: SMB protocol and metadata optimizations
# ==============================================================================

[default]
# ------------------------------------------------------------------------------
# METADATA & FILESYSTEM BEHAVIOR
# ------------------------------------------------------------------------------
# ds_store_all_vols: Prevents Finder from writing .DS_Store files to shares.
# dir_cache_max: Boosts metadata RAM cache to kill "spinning gear" lag.
# streams: Enables support for Named Streams (Essential for macOS metadata).
# pathconf_cache_off: Disables path cache to favor 10GbE real-time lookups.
ds_store_all_vols=yes
dir_cache_max=1024
streams=yes
pathconf_cache_off=yes

# ------------------------------------------------------------------------------
# SECURITY & NEGOTIATION
# ------------------------------------------------------------------------------
# signing_optional: Requests server not to sign packets (saves CPU).
# validate_neg_off: Prevents forced security validation fallbacks to signing.
# protocol_vers_map: Limits to SMB 2/3 only (skips slow SMB 1 discovery).
signing_optional=no
validate_neg_off=yes
protocol_vers_map=6

# ------------------------------------------------------------------------------
# THROUGHPUT & STABILITY
# ------------------------------------------------------------------------------
# mc_on: Enables SMB Multichannel to use multiple TCP sessions for speed.
# soft: Set to "no" (Hard Mount) to prevent app crashes during minor hiccups.
mc_on=yes
soft=no
